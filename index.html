<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 Yara GPT 🎀</title>
    <!-- خطوط عربية جميلة وناعمة -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <header>
            <h1>🌸 Yara GPT 🎀</h1>
            <p>صديقتك الذكية، هون عشان تساعدك 💜</p>
        </header>
        <div id="chatBox" class="chat-box">
            <div class="message bot-message">مرحباً يا حلوة! كيف بقدر أساعدك اليوم؟ 🌸</div>
        </div>
        <div class="input-area">
            <input type="text" id="chatInput" placeholder="اكتبي رسالتك هون... 🎀">
            <button id="sendButton">إرسال 💜</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
